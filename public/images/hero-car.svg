<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 500">
  <defs>
    <radialGradient id="glow" cx="50%" cy="60%" r="60%">
      <stop offset="0%" style="stop-color:#cc0000;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#cc0000;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="bodyfill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a2a"/>
      <stop offset="100%" style="stop-color:#0f0f0f"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#cc0000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="760" height="500" fill="#0f0f0f"/>

  <!-- Red glow under car -->
  <ellipse cx="380" cy="400" rx="280" ry="60" fill="url(#glow)"/>

  <!-- Speed lines left -->
  <line x1="0" y1="280" x2="120" y2="310" stroke="#cc0000" stroke-width="0.8" opacity="0.4"/>
  <line x1="0" y1="300" x2="100" y2="325" stroke="#cc0000" stroke-width="0.5" opacity="0.25"/>
  <line x1="0" y1="260" x2="80" y2="270" stroke="#cc0000" stroke-width="0.3" opacity="0.2"/>

  <!-- Speed lines right -->
  <line x1="760" y1="280" x2="640" y2="310" stroke="#cc0000" stroke-width="0.8" opacity="0.4"/>
  <line x1="760" y1="300" x2="660" y2="325" stroke="#cc0000" stroke-width="0.5" opacity="0.25"/>
  <line x1="760" y1="260" x2="680" y2="270" stroke="#cc0000" stroke-width="0.3" opacity="0.2"/>

  <!-- SUV Car body (side view, 3/4) -->
  <!-- Wheels first (behind body) -->
  <circle cx="245" cy="368" r="52" fill="#0a0a0a" stroke="#222" stroke-width="2"/>
  <circle cx="245" cy="368" r="38" fill="#111" stroke="#cc0000" stroke-width="1.5"/>
  <circle cx="245" cy="368" r="16" fill="#1a1a1a" stroke="#cc0000" stroke-width="1"/>
  <!-- Wheel spokes -->
  <line x1="245" y1="330" x2="245" y2="406" stroke="#cc0000" stroke-width="1.5" opacity="0.7"/>
  <line x1="207" y1="368" x2="283" y2="368" stroke="#cc0000" stroke-width="1.5" opacity="0.7"/>
  <line x1="218" y1="341" x2="272" y2="395" stroke="#cc0000" stroke-width="1.5" opacity="0.7"/>
  <line x1="272" y1="341" x2="218" y2="395" stroke="#cc0000" stroke-width="1.5" opacity="0.7"/>

  <circle cx="515" cy="368" r="52" fill="#0a0a0a" stroke="#222" stroke-width="2"/>
  <circle cx="515" cy="368" r="38" fill="#111" stroke="#cc0000" stroke-width="1.5"/>
  <circle cx="515" cy="368" r="16" fill="#1a1a1a" stroke="#cc0000" stroke-width="1"/>
  <line x1="515" y1="330" x2="515" y2="406" stroke="#cc0000" stroke-width="1.5" opacity="0.7"/>
  <line x1="477" y1="368" x2="553" y2="368" stroke="#cc0000" stroke-width="1.5" opacity="0.7"/>
  <line x1="488" y1="341" x2="542" y2="395" stroke="#cc0000" stroke-width="1.5" opacity="0.7"/>
  <line x1="542" y1="341" x2="488" y2="395" stroke="#cc0000" stroke-width="1.5" opacity="0.7"/>

  <!-- Main body -->
  <path d="
    M 175 350
    L 175 295
    C 175 280 190 260 215 248
    L 270 220
    L 340 195
    L 430 185
    L 510 190
    L 560 205
    C 580 215 595 235 600 255
    L 610 295
    L 610 350
    Z
  " fill="url(#bodyfill)" stroke="#333" stroke-width="1" filter="url(#shadow)"/>

  <!-- Roof -->
  <path d="
    M 230 248
    L 260 210
    L 310 192
    L 430 185
    L 510 190
    L 545 210
    L 570 248
    Z
  " fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Windshield -->
  <path d="
    M 330 192
    L 305 248
    L 410 248
    L 430 185
    Z
  " fill="url(#glass)" stroke="#cc0000" stroke-width="0.8" opacity="0.9"/>

  <!-- Rear glass -->
  <path d="
    M 430 185
    L 510 190
    L 545 248
    L 415 248
    Z
  " fill="url(#glass)" stroke="#cc0000" stroke-width="0.8" opacity="0.7"/>

  <!-- Hood line -->
  <path d="M 235 248 L 210 295 L 295 295" stroke="#cc0000" stroke-width="0.8" fill="none" opacity="0.5"/>

  <!-- Door line -->
  <line x1="350" y1="248" x2="340" y2="348" stroke="#333" stroke-width="1"/>

  <!-- Body lower accent line -->
  <path d="M 195 320 L 590 320" stroke="#cc0000" stroke-width="1.5" opacity="0.6"/>

  <!-- Front bumper nose -->
  <path d="M 175 295 L 155 305 L 150 340 L 175 350" fill="#1a1a1a" stroke="#cc0000" stroke-width="1" opacity="0.8"/>

  <!-- Headlight -->
  <path d="M 162 305 L 182 298 L 196 310 L 175 320 Z" fill="#cc0000" opacity="0.85"/>
  <path d="M 162 305 L 182 298 L 196 310 L 175 320 Z" fill="none" stroke="#ff2200" stroke-width="0.5"/>

  <!-- DRL -->
  <line x1="158" y1="310" x2="178" y2="304" stroke="#ff4444" stroke-width="2" opacity="0.8"/>

  <!-- Rear light -->
  <path d="M 600 295 L 618 300 L 618 338 L 605 342 L 600 328 Z" fill="#cc0000" opacity="0.7"/>

  <!-- Ground shadow -->
  <ellipse cx="380" cy="415" rx="230" ry="12" fill="#000" opacity="0.7"/>

  <!-- NOSECUT CHINA watermark -->
  <text x="380" y="470"
        font-family="Impact, Arial Black, sans-serif"
        font-size="14"
        fill="#cc0000"
        text-anchor="middle"
        letter-spacing="6"
        opacity="0.4">NOSECUT CHINA</text>

  <!-- Top decorative line -->
  <rect x="0" y="0" width="760" height="2" fill="#cc0000" opacity="0.6"/>
</svg>
